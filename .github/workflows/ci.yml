name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-posix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build POSIX SIL
        run: make -f Makefile.posix

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and run unit tests
        run: make -f Makefile.test run

  misra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck
      - name: MISRA C check
        run: make -f Makefile.misra check
