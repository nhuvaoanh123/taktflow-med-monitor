name: MISRA C Compliance

on:
  push:
    branches: [main]
    paths: ['firmware/**']
  pull_request:
    branches: [main]
    paths: ['firmware/**']

jobs:
  misra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck
      - name: MISRA C:2012 check
        run: make -f Makefile.misra check
